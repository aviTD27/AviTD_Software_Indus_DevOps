version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: mysql_v1
    environment:
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    image: avitd27/myapp
    container_name: flask_app_v1
    ports:
      - "8080:80"

volumes:
  mysql_data:
  web_content:
    driver: local