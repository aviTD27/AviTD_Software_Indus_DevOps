services:
  mysql:
    image: mysql:8
    container_name: mysql_v1
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: test
    ports:
      - "3306:3306"
    volumes:
      - newMySqlVolume:/var/lib/mysql

  flask-app-1:
    image: avitd27/my-app:${APP1_IMAGE_TAG}
    container_name: flask_app_1
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      - mysql
    restart: always

  flask-app-2:
    image: avitd27/my-app:${APP2_IMAGE_TAG}
    container_name: flask_app_2
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      - mysql
    restart: always

volumes:
  newMySqlVolume:
